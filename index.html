<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARS — FPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

/* Меню */
.menu-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}
#main-menu { background: rgba(8, 8, 18, 0.95); }
#pause-menu { background: rgba(0, 0, 0, 0.8); display: none; }
#game-over-menu { background: rgba(20, 2, 2, 0.95); display: none; }
#victory-menu { background: rgba(2, 15, 2, 0.95); display: none; }

.menu-title {
  font-size: 72px; font-weight: bold; color: #fff;
  text-shadow: 0 0 30px rgba(100, 100, 255, 0.5);
  margin-bottom: 10px;
}
.menu-subtitle { font-size: 18px; color: #888; letter-spacing: 8px; margin-bottom: 50px; }
.menu-score { font-size: 28px; color: #ddd; margin: 15px 0; }

.menu-btn {
  width: 250px; padding: 15px; margin: 8px;
  font-size: 20px; font-weight: bold; letter-spacing: 2px;
  border: 2px solid #555; border-radius: 4px;
  background: rgba(255, 255, 255, 0.05); color: #fff;
  cursor: pointer; transition: all 0.2s;
}
.menu-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #aaa; }

/* HUD */
#hud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10; display: none;
}
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 24px; color: #fff; text-shadow: 0 0 4px #000;
}
#health-bar {
  position: absolute; bottom: 30px; left: 30px;
  font-size: 20px; color: #0f0;
}
#ammo-bar {
  position: absolute; bottom: 30px; right: 30px;
  font-size: 20px; color: #fff; text-align: right;
}
#score-bar {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  font-size: 20px; color: #fff;
}
#level-bar {
  position: absolute; top: 20px; left: 20px;
  font-size: 16px; color: #aaa;
}
#damage-flash {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9; opacity: 0;
  background: radial-gradient(ellipse at center, rgba(255,0,0,0.1) 0%, rgba(200,0,0,0.6) 60%, rgba(150,0,0,0.8) 100%);
  transition: opacity 0.3s ease-out;
}
#damage-vignette {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 8; opacity: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(180,0,0,0.5) 100%);
}
#level-message {
  position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
  font-size: 36px; color: #0f0; text-shadow: 0 0 20px #0f0;
  display: none;
}
#hitmarker {
  position: absolute; top: 50%; left: 50%;
  width: 22px; height: 22px;
  transform: translate(-50%, -50%);
  opacity: 0; pointer-events: none;
  transition: opacity 0.08s;
}
#hitmarker .hm-bar {
  position: absolute; width: 22px; height: 2px;
  background: #ff3333; box-shadow: 0 0 5px #ff0000;
  top: 50%; left: 0; margin-top: -1px;
}
#hitmarker .hm-bar:first-child { transform: rotate(45deg); }
#hitmarker .hm-bar:last-child  { transform: rotate(-45deg); }
</style>
</head>
<body>

<!-- Main Menu -->
<div id="main-menu" class="menu-overlay">
  <div class="menu-title">ARS</div>
  <div class="menu-subtitle">FIRST PERSON SHOOTER</div>
  <button class="menu-btn" onclick="startGame()">PLAY (Level 1–3)</button>
  <button class="menu-btn" style="border-color:#aacc66;color:#aaff66" onclick="startDust2()">de_dust2</button>
  <div style="margin-top: 30px; text-align: center;">
    <label style="color: #888; font-size: 16px;">Mouse Sensitivity</label><br>
    <input type="range" id="sens-main" min="1" max="20" value="10" style="width: 200px; margin-top: 8px;"
      oninput="setSensitivity(this.value)">
    <div id="sens-main-val" style="color: #aaa; font-size: 14px; margin-top: 4px;">10</div>
  </div>
</div>

<!-- Pause Menu -->
<div id="pause-menu" class="menu-overlay">
  <div class="menu-title" style="font-size:48px">PAUSED</div>
  <button class="menu-btn" onclick="resumeGame()">RESUME</button>
  <div style="margin: 15px 0; text-align: center;">
    <label style="color: #888; font-size: 16px;">Mouse Sensitivity</label><br>
    <input type="range" id="sens-pause" min="1" max="20" value="10" style="width: 200px; margin-top: 8px;"
      oninput="setSensitivity(this.value)">
    <div id="sens-pause-val" style="color: #aaa; font-size: 14px; margin-top: 4px;">10</div>
  </div>
  <button class="menu-btn" onclick="goToMenu()">MAIN MENU</button>
</div>

<!-- Game Over -->
<div id="game-over-menu" class="menu-overlay">
  <div class="menu-title" style="font-size:48px; color:#f33">GAME OVER</div>
  <div class="menu-score" id="go-score">Score: 0</div>
  <button class="menu-btn" onclick="startGame()">RETRY</button>
  <button class="menu-btn" onclick="goToMenu()">MAIN MENU</button>
</div>

<!-- Victory -->
<div id="victory-menu" class="menu-overlay">
  <div class="menu-title" style="font-size:48px; color:#3f3">VICTORY!</div>
  <div class="menu-score" id="v-score">Final Score: 0</div>
  <button class="menu-btn" onclick="goToMenu()">MAIN MENU</button>
</div>

<!-- HUD -->
<div id="hud">
  <div id="crosshair">+</div>
  <div id="health-bar">HP: 100</div>
  <div id="ammo-bar">30 / 30</div>
  <div id="score-bar">Score: 0</div>
  <div id="level-bar">Level 1</div>
  <div id="level-message"></div>
  <div id="hitmarker"><div class="hm-bar"></div><div class="hm-bar"></div></div>
</div>
<div id="damage-flash"></div>
<div id="damage-vignette"></div>

<script type="importmap">

    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============ GAME STATE ============
const state = {
  playing: false,
  paused: false,
  health: 100,
  maxHealth: 100,
  ammo: 30,
  maxAmmo: 30,
  score: 0,
  level: 0,
  canShoot: true,
  fireRate: 120,
  damage: 50,
  isReloading: false,
  reloadTime: 2.0,
  reloadTimer: 0,
  enemies: [],
  moveSpeed: 4.5,
  sensitivity: 1.0,
  keys: {},
  velocity: new THREE.Vector3(),
  direction: new THREE.Vector3(),
  gravity: 25,
  jumpForce: 8,
  verticalVelocity: 0,
  onGround: true,
  playerHeight: 1.6,
  crouchHeight: 0.9,
  isCrouching: false,
  mouseDown: false,
  shootCooldown: 0,
  cameraRecoil: 0,
  footstepTimer: 0,
  damageSoundCooldown: 0,
};

// ============ AUDIO ENGINE ============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playGunshot() {
  resumeAudio();
  const t = audioCtx.currentTime;

  // Noise crack
  const bufSize = Math.floor(audioCtx.sampleRate * 0.15);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.12));
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'highpass';
  noiseFilter.frequency.value = 1500;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(3.0, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
  noise.start(t);

  // Low thump body
  const osc = audioCtx.createOscillator();
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(55, t + 0.09);
  const oscGain = audioCtx.createGain();
  oscGain.gain.setValueAtTime(1.8, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  osc.connect(oscGain); oscGain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.1);
}

function playFootstep() {
  resumeAudio();
  const t = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * 0.06);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.25));
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 250 + Math.random() * 100;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.35, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  noise.start(t);
}

function playHit() {
  resumeAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.frequency.setValueAtTime(2000, t);
  osc.frequency.exponentialRampToValueAtTime(800, t + 0.04);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.05);
}

function playEnemyDeath() {
  resumeAudio();
  const t = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * 0.25);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.45));
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(500, t);
  filter.frequency.exponentialRampToValueAtTime(80, t + 0.25);
  filter.Q.value = 2.5;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.9, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  noise.start(t);
}

function playPlayerDamage() {
  resumeAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.18);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.55, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.2);
}

function playReloadStart() {
  resumeAudio();
  playMechClick(0.55, 700);
}

function playReloadEnd() {
  resumeAudio();
  playMechClick(0.75, 1300);
  setTimeout(() => playMechClick(0.5, 900), 80);
}

function playMechClick(vol, freq) {
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.4, t + 0.04);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.05);
}

function playPortalOpen() {
  resumeAudio();
  const t = audioCtx.currentTime;
  [0, 0.12, 0.25].forEach((delay, i) => {
    const osc = audioCtx.createOscillator();
    osc.frequency.setValueAtTime(250 + i * 180, t + delay);
    osc.frequency.exponentialRampToValueAtTime(900 + i * 220, t + delay + 0.35);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t + delay);
    gain.gain.linearRampToValueAtTime(0.28, t + delay + 0.06);
    gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t + delay); osc.stop(t + delay + 0.4);
  });
}

// ============ HIT MARKER ============
let hitmarkerTimer = 0;
function showHitMarker() {
  document.getElementById('hitmarker').style.opacity = '1';
  hitmarkerTimer = 0.12;
}

// ============ SPARK PARTICLES ============
const sparks = [];

function spawnSparks(position, normal) {
  const count = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < count; i++) {
    const geo = new THREE.BoxGeometry(0.015, 0.015, 0.05);
    const col = Math.random() > 0.4 ? 0xffcc00 : 0xff6600;
    const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);

    const spread = 0.9;
    const speed = 3.5 + Math.random() * 5;
    const vel = new THREE.Vector3(
      normal.x + (Math.random() - 0.5) * spread,
      normal.y + Math.random() * 0.4 + 0.1,
      normal.z + (Math.random() - 0.5) * spread
    ).normalize().multiplyScalar(speed);

    const life = 0.25 + Math.random() * 0.25;
    scene.add(mesh);
    sparks.push({ mesh, vel, life, maxLife: life });
  }
}

function updateSparks(delta) {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.life -= delta;
    if (s.life <= 0) {
      scene.remove(s.mesh);
      s.mesh.geometry.dispose();
      s.mesh.material.dispose();
      sparks.splice(i, 1);
      continue;
    }
    s.vel.y -= 18 * delta;
    s.mesh.position.addScaledVector(s.vel, delta);
    s.mesh.material.opacity = s.life / s.maxLife;
    // Orient along velocity
    if (s.vel.lengthSq() > 0.01) {
      s.mesh.lookAt(s.mesh.position.clone().add(s.vel));
    }
  }
}

// ============ SHELL CASINGS ============
const casings = [];
const MAX_CASINGS = 60;

function spawnCasing() {
  const geo = new THREE.CylinderGeometry(0.007, 0.007, 0.028, 7);
  const mat = new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.85, roughness: 0.25, transparent: true });
  const mesh = new THREE.Mesh(geo, mat);

  const right = new THREE.Vector3();
  const fwd = new THREE.Vector3();
  camera.getWorldDirection(fwd);
  right.crossVectors(fwd, new THREE.Vector3(0, 1, 0)).normalize();

  mesh.position.copy(camera.position);
  mesh.position.addScaledVector(right, 0.18);
  mesh.position.addScaledVector(fwd, -0.05);
  mesh.position.y -= 0.08;

  const speed = 2.5 + Math.random() * 1.5;
  const vel = new THREE.Vector3(
    right.x * speed + (Math.random() - 0.5) * 0.5,
    2.0 + Math.random() * 1.0,
    right.z * speed + (Math.random() - 0.5) * 0.5
  );
  const rotVel = new THREE.Vector3(
    (Math.random() - 0.5) * 22,
    (Math.random() - 0.5) * 22,
    (Math.random() - 0.5) * 22
  );

  scene.add(mesh);
  casings.push({ mesh, vel, rotVel, life: 2.5, settled: false });

  if (casings.length > MAX_CASINGS) {
    const old = casings.shift();
    scene.remove(old.mesh);
    old.mesh.geometry.dispose();
    old.mesh.material.dispose();
  }
}

function updateCasings(delta) {
  const floorY = 0.014;
  for (const c of casings) {
    c.life -= delta;
    if (c.life < 0.5) {
      c.mesh.material.opacity = c.life / 0.5;
    }
    if (c.settled) continue;

    c.vel.y -= 20 * delta;
    c.mesh.position.addScaledVector(c.vel, delta);
    c.mesh.rotation.x += c.rotVel.x * delta;
    c.mesh.rotation.y += c.rotVel.y * delta;
    c.mesh.rotation.z += c.rotVel.z * delta;

    if (c.mesh.position.y <= floorY) {
      c.mesh.position.y = floorY;
      c.vel.y = -c.vel.y * 0.28;
      c.vel.x *= 0.55;
      c.vel.z *= 0.55;
      c.rotVel.multiplyScalar(0.25);
      if (Math.abs(c.vel.y) < 0.3) c.settled = true;
    }
  }
}

// ============ LEVEL CONFIGS ============
const levels = [
  {
    name: "Level 1 — Training Room",
    size: 20, wallHeight: 4, enemyCount: 3,
    floorColor: 0x4a4a55, wallColor: 0x7a7a88,
    enemySpeed: 3, obstacles: [],
    lightColor: 0xffffff, lightIntensity: 1.2,
  },
  {
    name: "Level 2 — Dark Corridors",
    size: 30, wallHeight: 4, enemyCount: 5,
    floorColor: 0x3a2a40, wallColor: 0x5a4a65,
    enemySpeed: 4,
    obstacles: [
      { x: -5, z: -5, w: 1.5, h: 4, d: 1.5 },
      { x: 5, z: -5, w: 1.5, h: 4, d: 1.5 },
      { x: -5, z: 5, w: 1.5, h: 4, d: 1.5 },
      { x: 5, z: 5, w: 1.5, h: 4, d: 1.5 },
      { x: 0, z: 0, w: 1.5, h: 4, d: 1.5 },
    ],
    lightColor: 0xffaa66, lightIntensity: 1.0,
  },
  {
    name: "Level 3 — The Arena",
    size: 40, wallHeight: 5, enemyCount: 7,
    floorColor: 0x352020, wallColor: 0x553535,
    enemySpeed: 5,
    obstacles: [
      { x: -8, z: -3, w: 2, h: 2, d: 2 },
      { x: 8, z: 5, w: 2, h: 2, d: 2 },
      { x: 3, z: -10, w: 2, h: 2, d: 2 },
      { x: -12, z: 10, w: 2, h: 2, d: 2 },
      { x: -3, z: 12, w: 2, h: 2, d: 2 },
      { x: 14, z: -8, w: 2, h: 2, d: 2 },
    ],
    lightColor: 0xff5533, lightIntensity: 0.8,
  },
  {
    name: "de_dust2",
    isDust2: true,
    size: 160, wallHeight: 4.8, enemyCount: 16,
    floorColor: 0x948060, wallColor: 0x9a7850,
    enemySpeed: 5, obstacles: [],
    lightColor: 0xfff2d0, lightIntensity: 2.0,
  }

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.rotation.order = 'YXZ';
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera, document.body);
const clock = new THREE.Clock();

// Raycaster for shooting
const raycaster = new THREE.Raycaster();
raycaster.far = 100;
const shootOrigin = new THREE.Vector2(0, 0);

// Weapon group
const weaponGroup = new THREE.Group();
let weaponRecoil = 0;
let weaponBob = 0;

// Level objects to clean up
let levelObjects = [];
let levelLights = [];
let gateObject = null;
let gateActive = false;

// ============ BUILD WEAPON ============
function createWeapon() {
  weaponGroup.clear();

  // Gun body
  const bodyGeo = new THREE.BoxGeometry(0.06, 0.06, 0.35);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222228, metalness: 0.8, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  weaponGroup.add(body);

  // Barrel
  const barrelGeo = new THREE.BoxGeometry(0.03, 0.03, 0.3);
  const barrelMat = new THREE.MeshStandardMaterial({ color: 0x181820, metalness: 0.9, roughness: 0.2 });
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  barrel.position.set(0, 0.02, -0.25);
  weaponGroup.add(barrel);

  // Grip
  const gripGeo = new THREE.BoxGeometry(0.04, 0.12, 0.04);
  const gripMat = new THREE.MeshStandardMaterial({ color: 0x3a2210, roughness: 0.7 });
  const grip = new THREE.Mesh(gripGeo, gripMat);
  grip.position.set(0, -0.08, 0.05);
  weaponGroup.add(grip);

  // Muzzle flash light
  const muzzleLight = new THREE.PointLight(0xffdd88, 0, 3);
  muzzleLight.position.set(0, 0, -0.5);
  muzzleLight.name = 'muzzleLight';
  weaponGroup.add(muzzleLight);

  weaponGroup.position.set(0.25, -0.25, -0.5);
  camera.add(weaponGroup);
}

// ============ BUILD LEVEL ============
function clearLevel() {
  for (const obj of levelObjects) {
    scene.remove(obj);
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  }
  for (const l of levelLights) scene.remove(l);
  for (const e of state.enemies) {
    scene.remove(e.mesh);
  }
  if (gateObject) scene.remove(gateObject);
  for (const h of bulletHoles) scene.remove(h);
  bulletHoles.length = 0;
  for (const s of sparks) scene.remove(s.mesh);
  sparks.length = 0;
  for (const c of casings) scene.remove(c.mesh);
  casings.length = 0;
  levelObjects = [];
  levelLights = [];
  state.enemies = [];
  gateObject = null;
  gateActive = false;
}

function buildLevel(index) {
  if (levels[index].isDust2) { buildDust2(); return; }
  clearLevel();
  const cfg = levels[index];
  const half = cfg.size / 2;

  scene.fog = new THREE.Fog(0x111118, half * 0.8, half * 3);
  scene.background = new THREE.Color(0x0a0a10);

  // Strong ambient light
  const ambient = new THREE.AmbientLight(0x667788, 0.8);
  scene.add(ambient);
  levelLights.push(ambient);

  // Hemisphere light for natural fill
  const hemiLight = new THREE.HemisphereLight(0xaabbcc, 0x444466, 0.6);
  scene.add(hemiLight);
  levelLights.push(hemiLight);

  // Directional light (brighter)
  const dirLight = new THREE.DirectionalLight(cfg.lightColor, cfg.lightIntensity * 1.8);
  dirLight.position.set(half * 0.5, cfg.wallHeight * 2, half * 0.3);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.left = -half;
  dirLight.shadow.camera.right = half;
  dirLight.shadow.camera.top = half;
  dirLight.shadow.camera.bottom = -half;
  scene.add(dirLight);
  levelLights.push(dirLight);

  // Extra fill lights in all corners
  const cornerPositions = [
    [-half * 0.6, 3, -half * 0.6],
    [half * 0.6, 3, -half * 0.6],
    [-half * 0.6, 3, half * 0.6],
    [half * 0.6, 3, half * 0.6],
  ];
  for (const cp of cornerPositions) {
    const cl = new THREE.PointLight(0xeeeeff, 1.5, half * 1.2);
    cl.position.set(cp[0], cp[1], cp[2]);
    scene.add(cl);
    levelLights.push(cl);
  }

  // Center ceiling light
  const centerLight = new THREE.PointLight(0xffffff, 2, half * 1.5);
  centerLight.position.set(0, cfg.wallHeight - 0.5, 0);
  scene.add(centerLight);
  levelLights.push(centerLight);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(cfg.size, cfg.size);
  const floorMat = new THREE.MeshStandardMaterial({ color: cfg.floorColor, roughness: 0.8, side: THREE.DoubleSide });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);
  levelObjects.push(floor);

  // Ceiling
  const ceilGeo = new THREE.PlaneGeometry(cfg.size, cfg.size);
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1, side: THREE.DoubleSide });
  const ceil = new THREE.Mesh(ceilGeo, ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = cfg.wallHeight;
  scene.add(ceil);
  levelObjects.push(ceil);

  // Walls (side: THREE.DoubleSide so raycasts hit from inside)
  const wallMat = new THREE.MeshStandardMaterial({ color: cfg.wallColor, roughness: 0.7, side: THREE.DoubleSide });
  const wallPositions = [
    { x: 0, z: -half, ry: 0 },
    { x: 0, z: half, ry: 0 },
    { x: -half, z: 0, ry: Math.PI / 2 },
    { x: half, z: 0, ry: Math.PI / 2 },
  ];
  for (const wp of wallPositions) {
    const wallGeo = new THREE.PlaneGeometry(cfg.size, cfg.wallHeight);
    const wall = new THREE.Mesh(wallGeo, wallMat.clone());
    wall.position.set(wp.x, cfg.wallHeight / 2, wp.z);
    wall.rotation.y = wp.ry;
    if (wp.z === -half) wall.rotation.y = Math.PI;
    if (wp.x === half) wall.rotation.y = -Math.PI / 2;
    if (wp.x === -half) wall.rotation.y = Math.PI / 2;
    if (wp.z === half) wall.rotation.y = 0;
    wall.receiveShadow = true;
    scene.add(wall);
    levelObjects.push(wall);
  }

  // Obstacles
  for (const ob of cfg.obstacles) {
    const obGeo = new THREE.BoxGeometry(ob.w, ob.h, ob.d);
    const obMat = new THREE.MeshStandardMaterial({
      color: ob.h > 3 ? 0x4a3a50 : 0x6a5530,
      roughness: 0.6
    });
    const obMesh = new THREE.Mesh(obGeo, obMat);
    obMesh.position.set(ob.x, ob.h / 2, ob.z);
    obMesh.castShadow = true;
    obMesh.receiveShadow = true;
    obMesh.userData.isObstacle = true;
    scene.add(obMesh);
    levelObjects.push(obMesh);
  }

  // Extra colored lights for level 2+
  if (index >= 1) {
    const l1 = new THREE.PointLight(0xffaa44, 3, half * 1.2);
    l1.position.set(-half * 0.5, 3, -half * 0.5);
    scene.add(l1); levelLights.push(l1);

    const l2 = new THREE.PointLight(0x4477ff, 3, half * 1.2);
    l2.position.set(half * 0.5, 3, half * 0.5);
    scene.add(l2); levelLights.push(l2);
  }
  if (index >= 2) {
    const l3 = new THREE.PointLight(0xff5533, 4, half);
    l3.position.set(-half * 0.6, 3, half * 0.4);
    scene.add(l3); levelLights.push(l3);

    const l4 = new THREE.PointLight(0xff5533, 4, half);
    l4.position.set(half * 0.6, 3, -half * 0.4);
    scene.add(l4); levelLights.push(l4);
  }

  // Spawn enemies
  for (let i = 0; i < cfg.enemyCount; i++) {
    spawnEnemy(cfg, half, i);
  }

  // Level gate (hidden until all enemies dead)
  const gateGeo = new THREE.BoxGeometry(2, 3, 0.1);
  const gateMat = new THREE.MeshStandardMaterial({
    color: 0x33ff33, emissive: 0x33ff33, emissiveIntensity: 2, transparent: true, opacity: 0.7
  });
  gateObject = new THREE.Mesh(gateGeo, gateMat);
  gateObject.position.set(0, 1.5, -(half - 0.5));
  gateObject.visible = false;
  scene.add(gateObject);

  // Player start position
  camera.position.set(0, state.playerHeight, half - 3);
  state.velocity.set(0, 0, 0);
  state.verticalVelocity = 0;
  state.onGround = true;

  // Reset player
  state.health = state.maxHealth;
  state.ammo = state.maxAmmo;
  state.canShoot = true;
  state.isReloading = false;
  state.reloadTimer = 0;

  showLevelMessage(cfg.name);
}

function spawnEnemy(cfg, half, index) {
  const angle = (index / cfg.enemyCount) * Math.PI * 2;
  const dist = half * 0.5 + Math.random() * half * 0.2;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist - half * 0.3;

  const enemyGroup = new THREE.Group();

  // Body (capsule-like using cylinder + spheres)
  const bodyGeo = new THREE.CylinderGeometry(0.35, 0.35, 1.2, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.5 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.9;
  body.castShadow = true;
  enemyGroup.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.25, 8, 6);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xdd4444, roughness: 0.5 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.65;
  head.castShadow = true;
  enemyGroup.add(head);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.05, 4, 4);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 2 });
  const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
  leftEye.position.set(-0.1, 1.7, -0.2);
  enemyGroup.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
  rightEye.position.set(0.1, 1.7, -0.2);
  enemyGroup.add(rightEye);

  enemyGroup.position.set(x, 0, z);
  scene.add(enemyGroup);

  state.enemies.push({
    mesh: enemyGroup,
    health: 100,
    speed: cfg.enemySpeed,
    alive: true,
    attackRange: 2,
    detectionRange: cfg.size * 0.6,
    bodyMat: bodyMat,
    headMat: headMat,
  });
}

// spawnEnemyAt — absolute position, used by buildDust2
function spawnEnemyAt(x, y, z, speed, detectionRange) {
  const enemyGroup = new THREE.Group();
  const bodyGeo = new THREE.CylinderGeometry(0.35, 0.35, 1.2, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2a5a2a, roughness: 0.5 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.9; body.castShadow = true;
  enemyGroup.add(body);
  const headGeo = new THREE.SphereGeometry(0.25, 8, 6);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a870, roughness: 0.5 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.65; head.castShadow = true;
  enemyGroup.add(head);
  const eyeGeo = new THREE.SphereGeometry(0.05, 4, 4);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 2 });
  [-0.1, 0.1].forEach(dx => {
    const e = new THREE.Mesh(eyeGeo, eyeMat);
    e.position.set(dx, 1.7, -0.22);
    enemyGroup.add(e);
  });
  enemyGroup.position.set(x, y, z);
  scene.add(enemyGroup);
  state.enemies.push({ mesh: enemyGroup, health: 100, speed, alive: true,
    attackRange: 2, detectionRange, bodyMat, headMat });
}

  function floor(x1,z1,x2,z2,y,col){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(Math.abs(x2-x1),Math.abs(z2-z1)),
      new THREE.MeshStandardMaterial({color:col,roughness:.9,side:THREE.DoubleSide}));
    m.rotation.x=-Math.PI/2; m.position.set((x1+x2)/2,y,(z1+z2)/2);
    m.receiveShadow=true; scene.add(m); levelObjects.push(m);
  }
  function ceil(x1,z1,x2,z2,y,col=0x4a3e30){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(Math.abs(x2-x1),Math.abs(z2-z1)),
      new THREE.MeshStandardMaterial({color:col,roughness:1,side:THREE.DoubleSide}));
    m.rotation.x=Math.PI/2; m.position.set((x1+x2)/2,y,(z1+z2)/2);
    scene.add(m); levelObjects.push(m);
  }
  // axis-aligned wall box (has collision)
  function wall(cx,cz,wx,wz,h,col,y0=0){
    const m=new THREE.Mesh(new THREE.BoxGeometry(wx,h,wz),
      new THREE.MeshStandardMaterial({color:col,roughness:.75}));

// ============ GAME LOGIC ============
function updateEnemies(delta) {
  const playerPos = camera.position.clone();
  playerPos.y = 0;
  const cfg = levels[state.level];
  const half = cfg.size / 2 - 1;

  for (const enemy of state.enemies) {
    if (!enemy.alive) continue;

    const enemyPos = enemy.mesh.position.clone();
    enemyPos.y = 0;
    const dist = enemyPos.distanceTo(playerPos);

    if (dist < enemy.detectionRange) {
      // Move toward player
      const dir = playerPos.clone().sub(enemyPos).normalize();

      if (dist > enemy.attackRange) {
        const move = dir.multiplyScalar(enemy.speed * delta);
        enemy.mesh.position.x += move.x;
        enemy.mesh.position.z += move.z;

        // Clamp to room bounds
        enemy.mesh.position.x = THREE.MathUtils.clamp(enemy.mesh.position.x, -half, half);
        enemy.mesh.position.z = THREE.MathUtils.clamp(enemy.mesh.position.z, -half, half);
      }

      // Face player
      enemy.mesh.lookAt(new THREE.Vector3(playerPos.x, 0, playerPos.z));

      // Attack if close
      if (dist < enemy.attackRange) {
        takeDamage(10 * delta);
      }
    }
  }

  // Check if all enemies dead — show gate
  if (!gateActive && state.enemies.every(e => !e.alive)) {
    gateActive = true;
    if (gateObject) gateObject.visible = true;
    playPortalOpen();
    showLevelMessage("Portal opened!");
  }

  // Check if player touches gate
  if (gateActive && gateObject) {
    const gateDist = camera.position.distanceTo(gateObject.position);
    if (gateDist < 2.5) {
      nextLevel();
    }
    // Gate animation
    gateObject.rotation.y += delta * 2;
    gateObject.material.opacity = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
  }
}

function shoot() {
  if (state.isReloading || state.paused) return;
  if (state.ammo <= 0) {
    startReload();
    return;
  }

  state.shootCooldown = state.fireRate / 1000;
  state.ammo--;
  weaponRecoil = 1.0;
  playGunshot();
  spawnCasing();

  // Camera recoil — vertical only, capped
  const maxRecoil = 0.06; // ~3.5 degrees max
  if (state.cameraRecoil < maxRecoil) {
    const kick = 0.003 + Math.random() * 0.002;
    const actual = Math.min(kick, maxRecoil - state.cameraRecoil);
    state.cameraRecoil += actual;
    camera.rotation.x += actual;
  }

  // Muzzle flash
  const muzzle = weaponGroup.getObjectByName('muzzleLight');
  if (muzzle) {
    muzzle.intensity = 5;
    setTimeout(() => { muzzle.intensity = 0; }, 50);
  }

  // Raycast from camera center
  raycaster.setFromCamera(shootOrigin, camera);

  // Check enemy hits
  const enemyMeshes = state.enemies.filter(e => e.alive).map(e => e.mesh);
  const allTargets = [];
  for (const em of enemyMeshes) {
    em.traverse(child => {
      if (child.isMesh) allTargets.push(child);
    });
  }

  // Check enemy hits first
  const hits = raycaster.intersectObjects(allTargets, false);
  let hitEnemy = false;
  if (hits.length > 0) {
    const hitObj = hits[0].object;
    for (const enemy of state.enemies) {
      if (!enemy.alive) continue;
      let found = false;
      enemy.mesh.traverse(child => {
        if (child === hitObj) found = true;
      });
      if (found) {
        damageEnemy(enemy, state.damage);
        playHit();
        showHitMarker();
        hitEnemy = true;
        break;
      }
    }
  }

  // If no enemy hit, check walls/floor/obstacles for bullet hole
  if (!hitEnemy) {
    const wallHits = raycaster.intersectObjects(levelObjects, false);
    if (wallHits.length > 0) {
      const hit = wallHits[0];
      const normal = hit.face ? hit.face.normal.clone().transformDirection(hit.object.matrixWorld) : raycaster.ray.direction.clone().negate();
      spawnBulletHole(hit.point, normal);
      spawnSparks(hit.point, normal);
    }
  }
}

// Bullet holes
const bulletHoles = [];
const MAX_BULLET_HOLES = 100;
const bulletHoleGeo = new THREE.CircleGeometry(0.02, 8);
const bulletHoleMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide, depthWrite: false, transparent: true, opacity: 0.9, polygonOffset: true, polygonOffsetFactor: -4 });
const bulletRingGeo = new THREE.RingGeometry(0.02, 0.04, 8);
const bulletRingMat = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide, depthWrite: false, transparent: true, opacity: 0.5, polygonOffset: true, polygonOffsetFactor: -3 });

function spawnBulletHole(position, normal) {
  const group = new THREE.Group();

  // Black center
  const hole = new THREE.Mesh(bulletHoleGeo, bulletHoleMat.clone());
  group.add(hole);

  // Dark ring around
  const ring = new THREE.Mesh(bulletRingGeo, bulletRingMat.clone());
  group.add(ring);

  group.position.copy(position).addScaledVector(normal, 0.005);
  const target = position.clone().add(normal);
  group.lookAt(target);

  // Random rotation for variety
  group.rotateOnAxis(new THREE.Vector3(0, 0, 1), Math.random() * Math.PI * 2);
  // Slight random size
  const s = 0.8 + Math.random() * 0.4;
  group.scale.set(s, s, s);

  scene.add(group);
  bulletHoles.push(group);

  if (bulletHoles.length > MAX_BULLET_HOLES) {
    const old = bulletHoles.shift();
    scene.remove(old);
  }
}

function damageEnemy(enemy, amount) {
  enemy.health -= amount;

  // Flash white
  const origColor = enemy.bodyMat.color.getHex();
  enemy.bodyMat.color.setHex(0xffffff);
  enemy.headMat.color.setHex(0xffffff);
  setTimeout(() => {
    if (enemy.alive) {
      enemy.bodyMat.color.setHex(0xcc3333);
      enemy.headMat.color.setHex(0xdd4444);
    }
  }, 80);

  if (enemy.health <= 0) {
    killEnemy(enemy);
  }
}

function killEnemy(enemy) {
  enemy.alive = false;
  state.score += 100;
  playEnemyDeath();

  // Death animation — shrink and remove
  const startScale = { y: 1 };
  const startTime = Date.now();
  const animate = () => {
    const t = (Date.now() - startTime) / 300;
    if (t >= 1) {
      scene.remove(enemy.mesh);
      return;
    }
    enemy.mesh.scale.y = 1 - t * 0.9;
    enemy.mesh.position.y = -(t * 0.8);
    requestAnimationFrame(animate);
  };
  animate();
}

let damageFlashTimer = 0;

function takeDamage(amount) {
  state.health -= amount;

  // Sound (throttled)
  if (state.damageSoundCooldown <= 0) {
    playPlayerDamage();
    state.damageSoundCooldown = 0.4;
  }

  // Red flash — intensity depends on damage
  const flash = document.getElementById('damage-flash');
  const intensity = Math.min(amount / 10, 1);
  flash.style.opacity = 0.3 + intensity * 0.7;
  damageFlashTimer = 0.3;

  if (state.health <= 0) {
    state.health = 0;
    gameOver();
  }
}

function updateDamageEffects(delta) {
  // Flash fade out
  if (damageFlashTimer > 0) {
    damageFlashTimer -= delta;
    if (damageFlashTimer <= 0) {
      document.getElementById('damage-flash').style.opacity = 0;
    }
  }

  // Persistent red vignette when low HP
  const vignette = document.getElementById('damage-vignette');
  if (state.health < 40) {
    const intensity = 1.0 - (state.health / 40);
    const pulse = 0.3 + Math.sin(Date.now() * 0.004) * 0.15;
    vignette.style.opacity = intensity * pulse + intensity * 0.4;
  } else {
    vignette.style.opacity = 0;
  }
}

function updateRecoilRecovery(delta) {
  // When not shooting, smoothly pull camera back down
  if (state.cameraRecoil > 0 && !state.mouseDown) {
    const recovery = Math.min(state.cameraRecoil, delta * 5);
    camera.rotation.x -= recovery;
    state.cameraRecoil -= recovery;
    if (state.cameraRecoil < 0.001) state.cameraRecoil = 0;
  }
}

function reload() {
  if (state.isReloading || state.ammo === state.maxAmmo) return;
  startReload();
}

function startReload() {
  if (state.isReloading) return;
  state.isReloading = true;
  state.reloadTimer = state.reloadTime;
  playReloadStart();
}

function updateReload(delta) {
  if (!state.isReloading) return;
  state.reloadTimer -= delta;

  // Animate weapon: move down then back up
  const progress = 1.0 - (state.reloadTimer / state.reloadTime);
  if (progress < 0.4) {
    // Weapon goes down
    const t = progress / 0.4;
    weaponGroup.position.y = -0.25 - t * 0.4;
    weaponGroup.rotation.z = t * 0.3;
  } else if (progress < 0.6) {
    // Hold down (swapping mag)
    weaponGroup.position.y = -0.65;
    weaponGroup.rotation.z = 0.3;
  } else {
    // Weapon comes back up
    const t = (progress - 0.6) / 0.4;
    weaponGroup.position.y = -0.65 + t * 0.4;
    weaponGroup.rotation.z = 0.3 * (1 - t);
  }

  if (state.reloadTimer <= 0) {
    state.isReloading = false;
    state.ammo = state.maxAmmo;
    state.reloadTimer = 0;
    playReloadEnd();
  }
}

// ============ PLAYER MOVEMENT ============
function updateMovement(delta) {
  if (!state.playing || state.paused) return;
  if (!controls.isLocked) return;

  const cfg = levels[state.level];
  const half = cfg.size / 2 - 0.5;

  // Friction
  state.velocity.x *= 0.85;
  state.velocity.z *= 0.85;

  const forward = new THREE.Vector3();
  const right = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  const speed = state.isCrouching ? state.moveSpeed * 0.5 : state.moveSpeed;
  if (state.keys['KeyW']) { state.velocity.x += forward.x * speed * delta; state.velocity.z += forward.z * speed * delta; }
  if (state.keys['KeyS']) { state.velocity.x -= forward.x * speed * delta; state.velocity.z -= forward.z * speed * delta; }
  if (state.keys['KeyA']) { state.velocity.x -= right.x * speed * delta; state.velocity.z -= right.z * speed * delta; }
  if (state.keys['KeyD']) { state.velocity.x += right.x * speed * delta; state.velocity.z += right.z * speed * delta; }

  // Crouch
  state.isCrouching = !!state.keys['ShiftLeft'] || !!state.keys['ShiftRight'];
  const targetHeight = state.isCrouching ? state.crouchHeight : state.playerHeight;

  // Jump (can't jump while crouching)
  if (state.keys['Space'] && state.onGround && !state.isCrouching) {
    state.verticalVelocity = state.jumpForce;
    state.onGround = false;
  }

  // Gravity
  state.verticalVelocity -= state.gravity * delta;
  camera.position.y += state.verticalVelocity * delta;

  // Ground check
  if (camera.position.y <= targetHeight) {
    camera.position.y = targetHeight;
    state.verticalVelocity = 0;
    state.onGround = true;
  }

  // Smooth crouch transition when in air
  if (state.onGround) {
    camera.position.y = targetHeight;
  }

  camera.position.x += state.velocity.x;
  camera.position.z += state.velocity.z;

  // Clamp to room
  camera.position.x = THREE.MathUtils.clamp(camera.position.x, -half, half);
  camera.position.z = THREE.MathUtils.clamp(camera.position.z, -half, half);

  // Footsteps
  const isMoving = state.keys['KeyW'] || state.keys['KeyS'] || state.keys['KeyA'] || state.keys['KeyD'];
  const stepInterval = state.isCrouching ? 0.55 : 0.38;
  if (isMoving && state.onGround && controls.isLocked) {
    state.footstepTimer -= delta;
    if (state.footstepTimer <= 0) {
      playFootstep();
      state.footstepTimer = stepInterval;
    }
  } else {
    state.footstepTimer = 0;
  }

  // Simple obstacle collision
  for (const obj of levelObjects) {
    if (!obj.userData.isObstacle) continue;
    const op = obj.position;
    const s = obj.geometry.parameters;
    const hw = s.width / 2 + 0.4;
    const hd = s.depth / 2 + 0.4;
    if (Math.abs(camera.position.x - op.x) < hw && Math.abs(camera.position.z - op.z) < hd) {
      const dx = camera.position.x - op.x;
      const dz = camera.position.z - op.z;
      if (Math.abs(dx) / hw > Math.abs(dz) / hd) {
        camera.position.x = op.x + Math.sign(dx) * hw;
      } else {
        camera.position.z = op.z + Math.sign(dz) * hd;
      }
    }
  }
}

// ============ WEAPON ANIMATION ============
function updateWeapon(delta) {
  if (!weaponGroup) return;

  // Recoil
  if (weaponRecoil > 0) {
    weaponRecoil = Math.max(0, weaponRecoil - delta * 10);
  }

  const basePos = new THREE.Vector3(0.25, -0.25, -0.5);

  // Walk bob
  const moving = state.keys['KeyW'] || state.keys['KeyS'] || state.keys['KeyA'] || state.keys['KeyD'];
  if (moving && controls.isLocked) {
    weaponBob += delta * 10;
    basePos.y += Math.sin(weaponBob) * 0.01;
    basePos.x += Math.cos(weaponBob * 0.5) * 0.005;
  }

  // Apply recoil
  basePos.z += weaponRecoil * 0.06;
  weaponGroup.rotation.x = weaponRecoil * 0.12;

  weaponGroup.position.copy(basePos);
}

// ============ HUD UPDATE ============
function updateHUD() {
  const healthEl = document.getElementById('health-bar');
  const ammoEl = document.getElementById('ammo-bar');
  const scoreEl = document.getElementById('score-bar');
  const levelEl = document.getElementById('level-bar');

  healthEl.textContent = 'HP: ' + Math.ceil(state.health);
  healthEl.style.color = state.health > 50 ? '#0f0' : state.health > 25 ? '#ff0' : '#f00';
  ammoEl.textContent = state.isReloading
    ? 'RELOADING...'
    : state.ammo + ' / ' + state.maxAmmo;
  scoreEl.textContent = 'Score: ' + state.score;
  levelEl.textContent = 'Level ' + (state.level + 1);
}

// ============ INPUT ============
document.addEventListener('keydown', (e) => {
  resumeAudio();
  state.keys[e.code] = true;

  if (e.code === 'Escape' && state.playing) {
    if (state.paused) resumeGame();
    else pauseGame();
  }
  if ((e.code === 'KeyR' || e.code === 'ControlLeft' || e.code === 'ControlRight') && state.playing && !state.paused) {
    e.preventDefault();
    reload();
  }
});

document.addEventListener('keyup', (e) => {
  state.keys[e.code] = false;
});

document.addEventListener('mousedown', (e) => {
  resumeAudio();
  if (e.button === 0) state.mouseDown = true;
});

document.addEventListener('mouseup', (e) => {
  if (e.button === 0) state.mouseDown = false;
});

controls.addEventListener('lock', () => {
  if (state.playing && !state.paused) {
    // Good — playing
  }
});

controls.addEventListener('unlock', () => {
  if (state.playing && !state.paused) {
    pauseGame();
  }
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ GAME LOOP ============
scene.add(camera);

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1);

  if (state.playing && !state.paused) {
    updateMovement(delta);
    updateEnemies(delta);
    updateWeapon(delta);
    updateDamageEffects(delta);
    updateRecoilRecovery(delta);
    updateSparks(delta);
    updateCasings(delta);
    if (state.damageSoundCooldown > 0) state.damageSoundCooldown -= delta;
    if (hitmarkerTimer > 0) {
      hitmarkerTimer -= delta;
      if (hitmarkerTimer <= 0) document.getElementById('hitmarker').style.opacity = '0';
    }
    updateHUD();

    // Force stable horizon — never allow roll
    camera.rotation.z = 0;
    camera.rotation.order = 'YXZ';

    // Reload animation
    updateReload(delta);

    // Auto-fire while mouse held
    if (state.shootCooldown > 0) state.shootCooldown -= delta;
    if (state.mouseDown && state.shootCooldown <= 0 && !state.isReloading && controls.isLocked) {
      shoot();
    }
  }

  renderer.render(scene, camera);
}

animate();
window.__game = { camera, scene, state, controls };
</script>
